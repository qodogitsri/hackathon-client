<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hackathon Tasks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-labelledby="page-title">
        <header class="header">
          <div>
            <p class="eyebrow">FastAPI + Vanilla JS</p>
            <h1 id="page-title">Hackathon Tasks</h1>
          </div>
          <span id="api-status" class="status status-pending">Checking API</span>
        </header>

        <form id="task-form" class="task-form">
          <label class="sr-only" for="task-title">Task title</label>
          <input
            id="task-title"
            name="title"
            type="text"
            maxlength="120"
            placeholder="Add a task..."
            autocomplete="off"
            required
          />
          <button type="submit">Add</button>
        </form>

        <dl class="summary" aria-label="Task summary">
          <div>
            <dt>Total</dt>
            <dd id="summary-total">0</dd>
          </div>
          <div>
            <dt>Open</dt>
            <dd id="summary-open">0</dd>
          </div>
          <div>
            <dt>Done</dt>
            <dd id="summary-completed">0</dd>
          </div>
        </dl>

        <div class="toolbar">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="open">Open</button>
          <button class="filter-button" type="button" data-filter="done">Done</button>
        </div>

        <ul id="task-list" class="task-list" aria-live="polite"></ul>
        <p id="empty-state" class="empty-state" hidden>No tasks match this view.</p>
      </section>
    </main>

    <template id="task-template">
      <li class="task-item">
        <label class="task-check">
          <input type="checkbox" />
          <span></span>
        </label>
        <button class="delete-button" type="button" aria-label="Delete task">Delete</button>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
